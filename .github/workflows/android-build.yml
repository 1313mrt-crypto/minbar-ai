name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # در اینجا از gradlew خودِ پروژه استفاده می‌کنیم، اما متغیر محیطی جاوا را به زور به آن تزریق می‌کنیم
      - name: Build with Gradle
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --stacktrace
