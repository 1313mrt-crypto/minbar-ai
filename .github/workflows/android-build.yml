name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # استفاده از خودِ gradle نصب شده در سرور به جای فایلِ gradlewِ پروژه
      - name: Build with Gradle
        run: gradle clean assembleDebug
