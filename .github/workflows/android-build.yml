name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # تغییر بزرگ: استفاده از روش جایگزین برای نصب SDK
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5261c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187473751e9f1a87d3a6839352e008a0d2f" > $ANDROID_HOME/licenses/android-sdk-preview-license
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Clean and Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
