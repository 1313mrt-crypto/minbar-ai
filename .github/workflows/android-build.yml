name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # در این روش، ما مستقیماً دستور gradle را صدا می‌زنیم
      # و به جای فایل ./gradlew، از خودِ ابزارِ گریدل نصب شده روی سرور استفاده می‌کنیم
      - name: Build with Gradle
        run: gradle clean assembleDebug --stacktrace
